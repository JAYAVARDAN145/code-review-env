name: code-review-env
version: 0.1.0
description: >
  A real-world code review environment where an AI agent
  reviews code snippets and identifies bugs, security issues,
  and performance problems.

author: Jayavardan
email: jolapuramjayavardhan@gmail.com

tasks:
  - name: easy
    description: Find syntax and runtime errors in code
    difficulty: easy
    max_steps: 3

  - name: medium
    description: Identify logic bugs and performance issues
    difficulty: medium
    max_steps: 3

  - name: hard
    description: Find all security vulnerabilities in code
    difficulty: hard
    max_steps: 3

observation_space:
  code: string
  language: string
  task_description: string
  attempt: integer

action_space:
  review: string
  severity: string
  line_number: integer (optional)

reward:
  min: 0.0
  max: 1.0
  type: continuous